<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            background-color: #fafafa;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top-color: #ff9900; /* Amazonカラー */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="spinner"></div>
    <p>Amazonへ移動しています...</p>
</div>

<script>
    // 遷移先のAmazon情報
    const asin = "B0GQGL2WQJ";
    const webUrl = "https://www.amazon.co.jp/dp/" + asin;

    function redirect() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const isMobile = /android|iphone|ipad|ipod/i.test(userAgent);
        
        // X（Twitter）、LINE、Instagramなどのアプリ内ブラウザ判定
        const isAppInBrowser = /Twitter|FBAV|Instagram|Line/i.test(userAgent);
        const isAndroid = /android/i.test(userAgent);
        const isIOS = /iphone|ipad|ipod/i.test(userAgent);

        if (isMobile) {
            let appUrl = "";

            // --- 📱 パターン1：Android端末の場合 ---
            if (isAndroid) {
                // intentスキームを使い、Xアプリ内ブラウザを強制突破してAmazonアプリの商品ページを直接起動
                appUrl = "intent://www.amazon.co.jp/dp/" + asin + "/?_encoding=UTF8&psc=1#Intent;scheme=https;package=com.amazon.mShop.android.shopping;end";
                window.location.href = appUrl;
                
                setTimeout(function() {
                    window.location.href = webUrl;
                }, 1000);
                return;
            }

            // --- 🍏 パターン2：iPhone (iOS) で、かつXなどのアプリ内ブラウザの中にいる場合 ---
            if (isIOS && isAppInBrowser) {
                // Xのガードをすり抜けるため、Amazonアプリのディープリンク専用の特殊スキーム（検索・連動用）を直接叩く
                appUrl = "com.amazon.mobile.shopping.web://amazon.co.jp/dp/" + asin;
                window.location.href = appUrl;

                // 起動しなかった場合（アプリ未インストール時など）の保険としてブラウザ版を開く
                setTimeout(function() {
                    window.location.href = webUrl;
                }, 1000);
                return;
            }

            // --- 🌐 パターン3：通常のスマホブラウザ（Safari等）の場合 ---
            // 最新のユニバーサルリンク形式（アプリ自動起動パラメーター付き）で商品ページへ飛ばす
            appUrl = "https://www.amazon.co.jp/gp/aw/d/" + asin + "/?_encoding=UTF8&psc=1";
            window.location.href = appUrl;
            
            setTimeout(function() {
                window.location.href = webUrl;
            }, 1200);

        } else {
            // PCの場合は通常のWEBブラウザで遷移
            window.location.href = webUrl;
        }
    }

    // ページ読み込みと同時に実行
    window.onload = redirect;
</script>

</body>
</html>
